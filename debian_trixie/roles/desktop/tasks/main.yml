---
- name: Check if non-free repos are configured
  ansible.builtin.shell: |
    grep -rs 'non-free' /etc/apt/sources.list /etc/apt/sources.list.d/ 2>/dev/null || true
  register: nonfree_check
  changed_when: false
  become: true

- name: Enable non-free repositories
  ansible.builtin.deb822_repository:
    name: debian-non-free
    types: deb
    uris: http://deb.debian.org/debian
    suites: "{{ ansible_distribution_release }}"
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
  become: true
  when: "'non-free' not in nonfree_check.stdout"

- name: Install desktop packages
  ansible.builtin.apt:
    name:
      - ufw
      - dconf-cli
      - gnome-tweaks
      - gnome-shell-extension-manager
    state: present
    update_cache: yes
  become: true

- name: Configure UFW - allow SSH
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
  become: true

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  become: true
