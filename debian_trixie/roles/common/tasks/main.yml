---
- name: Ensure apt cache is up to date
  ansible.builtin.apt:
    update_cache: yes
  become: true

- name: Install common base packages
  ansible.builtin.apt:
    name:
      - build-essential
      - git
      - curl
      - wget
      - unzip
      - stow
      - ripgrep
      - fd-find
      - fzf
      - tmux
      - htop
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
  become: true
