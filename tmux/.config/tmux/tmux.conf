# ------------------------------
# 1. Basic Settings & Performance Fixes
# ------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -s escape-time 0
setw -g mode-keys vi
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g allow-rename on
set -g renumber-windows on
set -g mouse on
set -g set-titles on
setw -g monitor-activity on
set -g bell-action any
set -g visual-bell off
set -g visual-activity off
set -g focus-events on
setw -g aggressive-resize on
set -g detach-on-destroy off

# ------------------------------
# 2. Prefix Configuration
# ------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ------------------------------
# 3. Plugins (Define & Initialize)
# ------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @continuum-restore 'on'

# Initialize TPM (must happen before custom key overrides)
run '~/.tmux/plugins/tpm/tpm'

# ------------------------------
# 4. Custom Keybindings (The "Winners")
# ------------------------------

# Reload config
unbind %
bind % source-file ~/.config/tmux/tmux.conf \; display-message 'Config reloaded'

# Lazygit
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# Kill pane & window safety
unbind x
bind x confirm-before -p "Kill pane? (y/n)" kill-pane
bind X confirm-before -p "Kill entire window? (y/n)" kill-window

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window logic
bind c new-window -a -c "#{pane_current_path}"

# Copy mode (Fixed Space conflict)
unbind Space
bind Space copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Window navigation
bind-key -n C-S-Left previous-window
bind-key -n C-S-Right next-window

unbind s
bind s display-popup -E "
  tmux list-sessions -F '#{?session_attached,,}#{session_name}' |
  grep -v '^$' |
  fzf --reverse --header '  SESSIONS' --color='header:#b1c44f' |
  xargs tmux switch-client -t
"

unbind w
bind w display-popup -E "
  tmux list-windows -F '#{window_index} #{window_name}' |
  grep -v '^$' |
  fzf --reverse --header '󱂬  WINDOWS' --color='header:#b1c44f'|
  cut -d ' ' -f 1 |
  xargs tmux select-window -t
"

