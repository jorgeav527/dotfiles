# ------------------------------
# Basic settings
# ------------------------------

setw -g mode-keys vi
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g allow-rename on
set -g renumber-windows on
set -g default-terminal "${TERM}"
set -g mouse on
set -g set-titles on
setw -g monitor-activity on
set -g bell-action any
set -g visual-bell off
set -g visual-activity off
set -g focus-events on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -s escape-time 0
set -as terminal-features ",*:RGB"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# ------------------------------
# Prefix
# ------------------------------
unbind C-b
set -g prefix C-Space

# ------------------------------
# Reload config
# ------------------------------
unbind %
bind % source-file ~/.config/tmux/tmux.conf \; display-message '~/.config/tmux/tmux.conf reloaded'

# ------------------------------
# Lazygit
# ------------------------------
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# ------------------------------
# Kill pane & window safety
# ------------------------------
unbind x
bind x confirm-before -p "Kill pane? (y/n)" kill-pane
bind X confirm-before -p "Kill entire window? (y/n)" kill-window

# ------------------------------
# Splits
# ------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ------------------------------
# FZF popups
# ------------------------------
unbind s
bind s display-popup -E "
  tmux list-sessions -F '#{?session_attached,,}#{session_name}' |
  sed '/^$/d' |
  fzf --reverse --header jump-to-session |
  xargs tmux switch-client -t
"

unbind w
bind w display-popup -E "
  tmux list-windows -F '#{window_index} #{window_name}' |
  sed '/^$/d' |
  fzf --reverse --header jump-to-window |
  cut -d ' ' -f 1 |
  xargs tmux select-window -t
"

# ------------------------------
# Plugins
# ------------------------------
set -g @plugin 'tmux-plugins/tpm'               # Plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'      # Sane defaults for everyone
set -g @plugin 'tmux-plugins/tmux-resurrect'     # Manual session save/restore
set -g @plugin 'tmux-plugins/tmux-continuum'     # Auto-save/restore every 15m
set -g @plugin 'tmux-plugins/tmux-yank'          # System clipboard integration
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Visual prefix indicator
set -g @plugin 'sainnhe/tmux-fzf'              # Fuzzy search for tmux

set -g @continuum-restore 'on'

# TPM must be at bottom
run '~/.tmux/plugins/tpm/tpm'

# --- Base2Tone Forest Dark Colors ---
# bg_dark="#2a2d2a"       # A0
# bg_highlight="#353b35"  # A1
# selection_bg="#485148"  # A2
# fg_sage="#a1a58d"       # C2
# fg_light="#eaecdf"      # C6
# accent_green="#b1c44f"  # D3 (Bright Accent)
# dim_sage="#7d816a"      # C0

# --- Status Line Design ---
set -g status-style "bg=#2a2d2a,fg=#a1a58d"      # Background and default text (Forest Dark)

# Left side: Show session name with the bright accent
set -g status-left " #[bg=#b1c44f,fg=#2a2d2a,bold] #S #[bg=default,fg=#b1c44f] "
set -g status-left-length 20

# Window list: Matching the Session style
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#2a2d2a,bg=#b1c44f]#[fg=#2a2d2a,bg=#b1c44f,bold] #I:#W #[fg=#b1c44f,bg=#2a2d2a]"

# Right side: Prefix highlight and short clock
set -g status-right-length 50
set -g status-right "#{prefix_highlight} #[fg=#b1c44f]%H:%M  #[fg=#b1c44f,bold]%d-%b-%y "

# --- Prefix Highlight Colors (Matches your theme) ---
set -g @prefix_highlight_fg '#2a2d2a' 
set -g @prefix_highlight_bg '#b1c44f'
