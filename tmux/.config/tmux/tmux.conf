# ------------------------------
# Basic settings
# ------------------------------

set -g default-terminal "${TERM}"
set -ag terminal-overrides ",xterm-256color:Tc"
setw -g mode-keys vi
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g allow-rename on
set -g renumber-windows on
set -g mouse on
set -g set-titles on
setw -g monitor-activity on
set -g bell-action any
set -g visual-bell off
set -g visual-activity off
set -g focus-events on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -s escape-time 0
set -as terminal-features ",*:RGB"

# ------------------------------
# Prefix
# ------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ------------------------------
# Reload config
# ------------------------------
unbind %
bind % source-file ~/.config/tmux/tmux.conf \; display-message '~/.config/tmux/tmux.conf reloaded'

# ------------------------------
# Lazygit
# ------------------------------
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# ------------------------------
# Kill pane & window safety
# ------------------------------
unbind x
bind x confirm-before -p "Kill pane? (y/n)" kill-pane
bind X confirm-before -p "Kill entire window? (y/n)" kill-window

# ------------------------------
# Splits
# ------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


# ------------------------------
# New windows starts after the current
# ------------------------------
bind c new-window -a -c "#{pane_current_path}"


# Bind it to enter copy-mode
unbind Space
bind Space copy-mode

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Use Control + Shift + Right/Left Arrow to go to the next/previous window
bind-key -n C-S-Left previous-window
bind-key -n C-S-Right next-window

# ------------------------------
# FZF popups
# ------------------------------
unbind s
bind s display-popup -E "
  tmux list-sessions -F '#{?session_attached,,}#{session_name}' |
  sed '/^$/d' |
  fzf --reverse --header jump-to-session |
  xargs tmux switch-client -t
"

unbind w
bind w display-popup -E "
  tmux list-windows -F '#{window_index} #{window_name}' |
  sed '/^$/d' |
  fzf --reverse --header jump-to-window |
  cut -d ' ' -f 1 |
  xargs tmux select-window -t
"

# ------------------------------
# Plugins
# ------------------------------
set -g @plugin 'tmux-plugins/tpm'               # Plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'      # Sane defaults for everyone
set -g @plugin 'tmux-plugins/tmux-resurrect'     # Manual session save/restore
set -g @plugin 'tmux-plugins/tmux-continuum'     # Auto-save/restore every 15m
set -g @plugin 'tmux-plugins/tmux-yank'          # System clipboard integration
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Visual prefix indicator
set -g @plugin 'sainnhe/tmux-fzf'              # Fuzzy search for tmux

set -g @continuum-restore 'on'

# TPM must be at bottom
run '~/.tmux/plugins/tpm/tpm'

# 1. General Status Settings
set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#2a2d2a,fg=#a1a58d"

# 2. Left Side: Session Name [Pill Style]
# We use a semi-bold look with a smooth transition to the status bar
set -g status-left-length 30
set -g status-left "#[fg=#2a2d2a,bg=#b1c44f,bold]  #S #[fg=#b1c44f,bg=#2a2d2a,none] "

# 3. Window List: Modern Tab Style
# Inactive Window: Dimmer, cleaner
set -g window-status-separator ""
set -g window-status-format "#[fg=#7d816a,bg=#2a2d2a] #I:#W "

# Current Window: High contrast "Pill" with Powerline arrows
set -g window-status-current-format "#[fg=#2a2d2a,bg=#b1c44f]#[fg=#2a2d2a,bg=#b1c44f,bold] #I:#W #[fg=#b1c44f,bg=#2a2d2a]"

# 4. Right Side: Minimalist Info
# Added a cleaner separator and combined the clock/date into a single visual block
set -g status-right-length 60
set -g status-right "#{prefix_highlight}#[fg=#353b35]#[fg=#a1a58d,bg=#353b35] %H:%M #[fg=#b1c44f,bg=#353b35]#[fg=#2a2d2a,bg=#b1c44f,bold] %d-%b-%y "

# 5. Prefix Highlight (Enhanced)
set -g @prefix_highlight_fg '#2a2d2a'
set -g @prefix_highlight_bg '#b1c44f'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#2a2d2a,bg=#eaecdf,bold' # Different color for Copy Mode
